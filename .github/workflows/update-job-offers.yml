# Mise à jour quotidienne des offres d'emploi privées
# Réactive la consolidation de ce dépôt source pour éviter les JSON périmés.

name: Mise à jour offres quotidienne

permissions:
  contents: write
  issues: write

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: "Source à lancer (all = toutes)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - credit_agricole
          - societe_generale
          - deloitte
          - bnp_paribas
          - bpce
          - bpifrance
          - credit_mutuel
          - oddo_bhf

jobs:
  scrape:
    name: Scraper ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - name: Crédit Agricole
            key: credit_agricole
            script: credit_agricole_scraper.py
            db_file: credit_agricole_jobs.db
            timeout_minutes: 90
          - name: Société Générale
            key: societe_generale
            script: societe_generale_scraper_improved.py
            db_file: societe_generale_jobs.db
            timeout_minutes: 90
          - name: Deloitte
            key: deloitte
            script: deloitte_scraper.py
            db_file: deloitte_jobs.db
            timeout_minutes: 90
          - name: BNP Paribas
            key: bnp_paribas
            script: bnp_paribas_scraper.py
            db_file: bnp_paribas_jobs.db
            timeout_minutes: 180
          - name: BPCE
            key: bpce
            script: bpce_scraper.py
            db_file: bpce_jobs.db
            timeout_minutes: 90
          - name: Bpifrance
            key: bpifrance
            script: bpifrance_scraper.py
            db_file: bpifrance_jobs.db
            timeout_minutes: 90
          - name: Crédit Mutuel
            key: credit_mutuel
            script: credit_mutuel_scraper.py
            db_file: credit_mutuel_jobs.db
            timeout_minutes: 90
          - name: ODDO BHF
            key: oddo_bhf
            script: oddo_bhf_scraper.py
            db_file: oddo_bhf_jobs.db
            timeout_minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BNP_MAX_CONCURRENT_LISTING: "18"
      BNP_MAX_CONCURRENT_DETAILS: "18"
      PYTHONUNBUFFERED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configuration Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: PYTHON/requirements_scrapers.txt

      - name: Installation des dépendances
        run: |
          pip install -r PYTHON/requirements_scrapers.txt
          playwright install chromium firefox
          playwright install-deps chromium
          playwright install-deps firefox

      - name: Exécuter le scraper
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.source == 'all' || inputs.source == matrix.key }}
        run: python "PYTHON/${{ matrix.script }}"

      - name: Vérifier la base générée
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.source == 'all' || inputs.source == matrix.key }}
        run: test -f "PYTHON/${{ matrix.db_file }}"

      - name: Upload artifact base SQLite
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.source == 'all' || inputs.source == matrix.key }}
        uses: actions/upload-artifact@v4
        with:
          name: db-${{ matrix.key }}
          path: PYTHON/${{ matrix.db_file }}
          if-no-files-found: error

  consolidate:
    name: Consolidation + export
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: scrape
    if: always()
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TALEOS_REVALIDATE_MAX_PER_SOURCE: "600"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configuration Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: PYTHON/requirements_scrapers.txt

      - name: Installation des dépendances
        run: pip install -r PYTHON/requirements_scrapers.txt

      - name: Télécharger les bases produites
        uses: actions/download-artifact@v4
        with:
          pattern: db-*
          merge-multiple: true
          path: PYTHON

      - name: Consolider
        run: |
          python - <<'PY'
          import sys
          import subprocess
          from pathlib import Path
          root = Path.cwd()
          sys.path.insert(0, str(root / "PYTHON"))
          import update_all_jobs as jobs
          jobs.revalidate_live_offers_all_sources()
          jobs.merge_from_databases()
          subprocess.run([sys.executable, str(root / "PYTHON" / "export_sqlite_to_json.py")], check=True)
          PY

      - name: Vérifier les changements
        id: changes
        run: |
          if git diff --quiet HTML/scraped_jobs_live.json HTML/scraped_jobs.json scraped_jobs_live.json scraped_jobs.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit et push des mises à jour
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HTML/scraped_jobs_live.json HTML/scraped_jobs.json scraped_jobs_live.json scraped_jobs.json
          git commit -m "chore: mise à jour quotidienne des offres"
          git pull --rebase origin main
          git push origin main

  scraper-failure-alert:
    name: Alerte échec pipeline offres
    needs: scrape
    if: ${{ needs.scrape.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Résumé dans les logs
        run: |
          echo "::error::Pipeline mise à jour des offres en échec."
          echo "Run : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
