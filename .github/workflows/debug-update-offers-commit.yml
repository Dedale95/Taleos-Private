# Debug rapide : teste uniquement l'étape Commit/Push sans lancer les scrapers (1h)
# À lancer manuellement depuis Actions pour vérifier que le commit fonctionne
name: Debug commit offres (sans scrapers)

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  debug-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Simuler un changement (pour tester le commit)
        run: |
          export TS=$(date -Iseconds)
          python3 -c "
          import json, os
          ts = os.environ.get('TS', 'debug')
          for f in ['HTML/scraped_jobs_live.json', 'HTML/scraped_jobs.json']:
              try:
                  with open(f) as fp: d = json.load(fp)
                  if isinstance(d, list): d.append({'_debug': ts})
                  else: d['_debug'] = ts
                  with open(f, 'w') as fp: json.dump(d, fp, ensure_ascii=False, indent=2)
              except Exception as e: print(f'Skip {f}: {e}')
          "

      - name: Vérifier les changements
        id: changes
        run: |
          if git diff --quiet HTML/scraped_jobs_live.json HTML/scraped_jobs.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          echo "changed=${{ steps.changes.outputs.changed }}"

      - name: Commit et push (test)
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HTML/scraped_jobs_live.json HTML/scraped_jobs.json
          git status
          git commit -m "chore: debug commit offres (test)"
          git push origin main

      - name: Succès
        if: steps.changes.outputs.changed == 'true'
        run: echo "✅ Commit et push OK - le workflow principal devrait fonctionner"
