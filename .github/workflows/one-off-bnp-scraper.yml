# One-off BNP Paribas scraper - ajoute BNP SANS relancer les autres scrapers
# 1. Scrape BNP uniquement
# 2. Fusionne dans scraped_jobs_live.json (remplace les offres BNP existantes)
# 3. Commit et push → BNP dispo sur Taleos immédiatement

name: One-off BNP Paribas scraper

permissions:
  contents: write  # Pour push les JSON mis à jour

on:
  workflow_dispatch:

jobs:
  bnp-only:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # BNP ~2600 offres, ~20-25 min avec optimisations
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configuration Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: |
          pip install -r PYTHON/requirements_scrapers.txt
          playwright install chromium firefox
          playwright install-deps chromium
          playwright install-deps firefox

      # Restaurer la DB du run précédent (delta scraping — backlog de détails)
      - name: Restaurer le cache DB BNP
        uses: actions/cache/restore@v4
        with:
          path: PYTHON/bnp_paribas_jobs.db
          key: bnp-db-${{ github.run_id }}
          restore-keys: |
            bnp-db-

      - name: Scraper BNP Paribas uniquement
        run: cd PYTHON && python bnp_paribas_scraper.py
        env:
          PYTHONUNBUFFERED: 1

      # Sauvegarder la DB mise à jour pour le prochain run
      - name: Sauvegarder le cache DB BNP
        uses: actions/cache/save@v4
        with:
          path: PYTHON/bnp_paribas_jobs.db
          key: bnp-db-${{ github.run_id }}

      - name: Fusion BNP dans le JSON existant
        run: cd PYTHON && python merge_bnp_into_json.py

      - name: Stats BNP Paribas
        run: cd PYTHON && python show_job_stats.py

      - name: Commit et push des mises à jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HTML/scraped_jobs_live.json HTML/scraped_jobs.json scraped_jobs_live.json scraped_jobs.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: mise à jour offres BNP Paribas (one-off)"
            git pull --rebase origin main
            git push origin main
          else
            echo "Aucun changement à committer"
          fi
