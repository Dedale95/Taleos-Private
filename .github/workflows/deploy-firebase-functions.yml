# Déploie les Cloud Functions depuis GitHub (aucune machine perso requise au quotidien).
#
# À configurer une fois dans le dépôt GitHub :
#   Settings → Secrets and variables → Actions → New repository secret
#   Nom : FIREBASE_SERVICE_ACCOUNT_JSON
#   Valeur : contenu JSON d’un compte de service GCP autorisé à déployer sur project-taleos
#   (IAM → Comptes de service → Créer une clé JSON ; rôles typiques : « Administrateur Firebase »
#    ou rôles minimaux Cloud Functions + Cloud Build selon doc Firebase pour CI.)
#
# Déclencheurs : push sur main qui touche functions/ ou firebase.json, ou exécution manuelle.

name: Deploy Firebase Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-firebase-functions.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy functions
        run: firebase deploy --only functions --project project-taleos --non-interactive
