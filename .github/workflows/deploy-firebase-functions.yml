# Déploie les Cloud Functions depuis GitHub (aucune machine perso requise au quotidien).
#
# Secret dépôt : FIREBASE_SERVICE_ACCOUNT_JSON (JSON complet du compte de service GCP).
#
# IAM — obligatoire pour déployer des fonctions HTTPS (onRequest) : la CLI doit appliquer les politiques
# d’invocation (permission cloudfunctions.functions.setIamPolicy). Sans ce droit, le déploiement échoue avec :
#   « Missing required permission ... cloudfunctions.functions.setIamPolicy »
#
# Sur le compte de service dont le JSON est dans FIREBASE_SERVICE_ACCOUNT_JSON (vérifier client_email),
# ajouter sur project-taleos (Éditeur seul ne donne pas setIamPolicy pour les HTTPS) :
#   - roles/cloudfunctions.admin   (Cloud Functions Admin) — obligatoire pour l’erreur setIamPolicy
#   - roles/run.admin              (Cloud Run Admin) — utile pour Functions 2ᵉ gen
#   - roles/iam.serviceAccountUser (Service Account User) — exécution au nom du runtime SA
#
# Console : https://console.cloud.google.com/iam-admin/iam?project=project-taleos
#
# Déclencheurs : push sur main qui touche functions/ ou firebase.json, ou exécution manuelle.

name: Deploy Firebase Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-firebase-functions.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Évite l’avertissement Node 20 sur les actions JS (changelog GitHub 2025–2026).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Vérifier le secret (sans l’afficher)
        env:
          HAS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$HAS_JSON" ]; then
            echo "::error::Le secret FIREBASE_SERVICE_ACCOUNT_JSON est vide ou absent. Vérifie le nom exact dans Settings → Secrets → Actions."
            exit 1
          fi

      - name: Écrire la clé compte de service (fichier temporaire)
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$GOOGLE_CREDENTIALS" > "${GITHUB_WORKSPACE}/gcp-sa.json"
          chmod 600 "${GITHUB_WORKSPACE}/gcp-sa.json"

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # --force : politique de nettoyage Artifact Registry (évite erreur cleanup sans prompt)
      - name: Deploy functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: firebase deploy --only functions --project project-taleos --non-interactive --force
