name: Publish Public Site

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "HTML/**"
      - "index.html"
      - "landing_page_finance.html"
      - "scraped_jobs_live.json"
      - "scraped_jobs.json"
      - "scraped_jobs_summary.json"
      - "scraped_jobs.csv"
      - ".github/workflows/publish-public-site.yml"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private source repo
        uses: actions/checkout@v4

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: Dedale95/Taleos-Public
          token: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
          path: public-repo

      - name: Sync public files only
        shell: bash
        run: |
          set -euo pipefail

          # ⚠️  Les JSON de données (scraped_jobs_*.json) sont générés exclusivement
          # par le CI public (update-job-offers.yml) et incluent toutes les sources
          # (JP Morgan, Goldman Sachs…). On les PRÉSERVE depuis le dépôt public,
          # sans jamais les écraser avec la version incomplète du dépôt privé.
          # On utilise des noms de backup basés sur le chemin complet (/ → _) pour
          # éviter les collisions entre HTML/scraped_jobs_live.json et scraped_jobs_live.json.
          mkdir -p /tmp/public-data
          for f in \
            HTML/scraped_jobs_live.json \
            HTML/scraped_jobs.json \
            HTML/scraped_jobs_full.json \
            HTML/scraped_jobs_summary.json \
            scraped_jobs_live.json \
            scraped_jobs.json \
            scraped_jobs_summary.json \
            scraped_jobs.csv; do
            bak_name="$(echo "$f" | tr '/' '_')"
            [ -f "public-repo/$f" ] && cp "public-repo/$f" "/tmp/public-data/${bak_name}.bak" && echo "💾 Sauvegardé: $f" || true
          done

          rm -rf public-repo/HTML
          cp -R HTML public-repo/HTML

          cp index.html public-repo/index.html
          cp landing_page_finance.html public-repo/landing_page_finance.html

          # Restauration des fichiers de données protégés depuis le dépôt public
          for f in \
            HTML/scraped_jobs_live.json \
            HTML/scraped_jobs.json \
            HTML/scraped_jobs_full.json \
            HTML/scraped_jobs_summary.json \
            scraped_jobs_live.json \
            scraped_jobs.json \
            scraped_jobs_summary.json \
            scraped_jobs.csv; do
            bak_name="$(echo "$f" | tr '/' '_')"
            bak="/tmp/public-data/${bak_name}.bak"
            [ -f "$bak" ] && cp "$bak" "public-repo/$f" && echo "✅ Préservé: $f" || echo "ℹ️  Absent dans le dépôt public: $f"
          done

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail
          cd public-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git add .
          git commit -m "chore: publish public site from private source"
          git push origin main
