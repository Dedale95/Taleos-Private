<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taleos</title>
  <script src="../vendor/firebase-app-compat.js"></script>
  <script src="../vendor/firebase-auth-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 380px; min-height: 420px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
    .taleos-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .taleos-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3); }
    .taleos-btn:hover { box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); }
    .taleos-input { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem; }
    .taleos-input:focus { border-color: #667eea; outline: none; }
    .password-input-wrapper { position: relative; }
    .password-input-wrapper .taleos-input { padding-right: 46px; }
    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      color: #6b7280;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }
    .password-toggle:hover { color: #4f46e5; background: #eef2ff; }
    .password-toggle svg { width: 18px; height: 18px; }
    .password-toggle .pwd-icon-hide { display: none; }
    .password-toggle.is-visible .pwd-icon-show { display: none; }
    .password-toggle.is-visible .pwd-icon-hide { display: inline-flex; }
    .taleos-card { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); }
    .header { padding: 32px 24px; text-align: center; color: white; }
    .header-rounded { border-radius: 12px 12px 0 0; }
    .logo-box { width: 56px; height: 56px; margin: 0 auto 12px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .logo-box span { font-size: 1.5rem; font-weight: 700; }
    .form-section { padding: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; color: #374151; font-weight: 500; font-size: 0.9rem; }
    .btn-submit { width: 100%; padding: 14px; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-secondary { width: 100%; padding: 10px; margin-top: 12px; background: transparent; border: 1px solid #e5e7eb; border-radius: 8px; color: #6b7280; font-size: 0.85rem; cursor: pointer; }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-logout { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; color: #374151; font-weight: 500; cursor: pointer; background: white; }
    .btn-logout:hover { background: #f9fafb; }
    .btn-reload { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #c7d2fe; border-radius: 8px; color: #4f46e5; font-size: 0.9rem; cursor: pointer; background: white; }
    .btn-reload:hover { background: #eef2ff; }
    .error-text { color: #ef4444; font-size: 0.875rem; text-align: center; margin-top: 8px; }
    .loading-text { color: #6b7280; font-size: 0.875rem; text-align: center; margin-top: 8px; }
    .hidden { display: none !important; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #f3f4f6; }
    .card p { font-size: 0.875rem; color: #4b5563; }
  </style>
</head>
<body>
  <div id="auth-container">
    <div id="loading-view" style="padding: 48px 24px; text-align: center;">
      <div style="width: 32px; height: 32px; margin: 0 auto 16px; border: 3px solid #e5e7eb; border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
      <p style="color: #6b7280; font-size: 0.9rem;">Vérification de la connexion...</p>
    </div>
    <div id="login-view" class="hidden">
      <div class="taleos-gradient header header-rounded">
        <div class="logo-box"><span>T</span></div>
        <h1 style="font-size: 1.25rem; font-weight: 700;">Taleos</h1>
        <p style="font-size: 0.875rem; opacity: 0.9; margin-top: 4px;">Extension d'automatisation</p>
        <p id="version-badge" style="font-size: 0.7rem; opacity: 0.8; margin-top: 6px;"></p>
        <p id="version-reload-login" style="font-size: 0.65rem; opacity: 0.85; margin-top: 4px;"></p>
      </div>
      <div class="form-section">
        <form id="login-form">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="votre@email.com" required autocomplete="email" class="taleos-input">
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <div class="password-input-wrapper">
              <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" class="taleos-input">
              <button type="button" class="password-toggle" id="password-toggle-btn" aria-label="Afficher le mot de passe">
                <span class="pwd-icon pwd-icon-show" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </span>
                <span class="pwd-icon pwd-icon-hide" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </span>
              </button>
            </div>
          </div>
          <button type="submit" id="login-btn" class="taleos-btn btn-submit">Se connecter</button>
          <p id="login-error" class="error-text hidden"></p>
          <p id="login-loading" class="loading-text hidden">Connexion en cours...</p>
          <button type="button" id="reload-btn-login" class="btn-secondary">🔄 Mettre à jour l'extension</button>
        </form>
      </div>
    </div>

    <div id="logged-view" class="hidden">
      <div class="taleos-gradient header">
        <div class="logo-box"><span id="user-initial"></span></div>
        <p id="user-email" style="font-size: 0.875rem; opacity: 0.9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%;"></p>
      </div>
      <div class="form-section">
        <div class="taleos-card card">
          <p>Sur <strong>taleos.co</strong> ou <strong>dedale95.github.io</strong>, cliquez sur <strong>Candidater</strong> pour lancer l'automatisation.</p>
        </div>
        <p id="version-badge-logged" style="font-size: 0.7rem; color: #6b7280; margin-bottom: 4px;"></p>
        <p id="version-date" style="font-size: 0.65rem; color: #9ca3af; margin-bottom: 8px;"></p>
        <div class="taleos-card card" style="margin-bottom: 12px; padding: 12px;">
          <p style="font-size: 0.8rem; font-weight: 600; margin-bottom: 8px;">🔧 Diagnostic</p>
          <p id="diagnostic-status" style="font-size: 0.75rem; color: #6b7280; margin-bottom: 8px;">—</p>
          <p id="pilot-status" style="font-size: 0.72rem; font-weight: 600; margin-bottom: 6px; line-height: 1.35;">Pilotage : —</p>
          <p id="analytics-status" style="font-size: 0.72rem; color: #6b7280; margin-bottom: 8px;">Analytics: —</p>
          <p style="font-size: 0.72rem; color: #374151; margin-bottom: 4px;">Historique Analytics (dernier en haut)</p>
          <div id="analytics-log" style="font-size: 0.68rem; color: #6b7280; max-height: 90px; overflow: auto; border: 1px solid #e5e7eb; border-radius: 6px; padding: 6px; background: #fafafa; margin-bottom: 8px;">—</div>
          <button id="diagnostic-btn" class="btn-reload" style="margin-bottom: 6px;">Tester la connexion</button>
          <button id="refresh-taleos-btn" class="btn-reload">Rafraîchir les pages Taleos</button>
        </div>
        <button id="reload-btn" class="btn-reload">🔄 Mettre à jour l'extension</button>
        <button id="logout-btn" class="btn-logout">Se déconnecter</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
